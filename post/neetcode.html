<h2>Arrays and Hashing</h2>
<ol>
<li><a href="https://leetcode.com/problems/contains-duplicate/">Contains Duplicate</a></li>
</ol>
<div class="tabs-code-block" data-blocks='[{"language":"cpp","code":"class Solution {\npublic:\n    bool containsDuplicate(vector<int>& nums) {\n        unordered_map<int, int> count;\n        for (auto num : nums) {\n            if(count[num] >= 1)\n                return true;\n            count[num]++;\n        }\n        return false;\n    }\n};"},{"language":"python","code":"class Solution:\n    def containsDuplicate(self, nums: List[int]) -> bool:\n        return len(nums) != len(set(nums))"}]'></div>
<p>Time Complexity : <code>O(n)</code></p>
<p>Space Complexity : <code>O(n)</code></p>
